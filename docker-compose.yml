version: "3.9"

# ════════════════════════════════════════════════════════════════════════════
# ManiQuant Docker Compose
# 서비스: Milvus (etcd + minio + standalone) + ManiAgent API 서버
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── etcd (Milvus 메타 스토어) ────────────────────────────────────────────
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE:      revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES:       "4294967296"
      ETCD_SNAPSHOT_COUNT:            "50000"
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - maniverse-net

  # ── MinIO (Milvus 오브젝트 스토리지) ─────────────────────────────────────
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"   # MinIO 콘솔
      - "9000:9000"   # MinIO API
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - maniverse-net

  # ── Milvus Standalone ────────────────────────────────────────────────────
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS:        etcd:2379
      MINIO_ADDRESS:         minio:9000
      MINIO_ACCESS_KEY_ID:   minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "19530:19530"   # Milvus gRPC
      - "9091:9091"     # Milvus HTTP (헬스체크)
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - maniverse-net

  # ── ManiAgent API 서버 ───────────────────────────────────────────────────
  maniagent:
    container_name: maniagent-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MILVUS_HOST:          milvus
      MILVUS_PORT:          "19530"
      MILVUS_COLLECTION:    manidata_anti_aging
      RAG_TOP_K:            "5"
      RAG_SCORE_THRESHOLD:  "0.5"
      HOST:                 "0.0.0.0"
      PORT:                 "8000"
      RELOAD:               "false"
      # LLM API 키는 .env 파일에서 주입
      DEEPSEEK_API_KEY:     ${DEEPSEEK_API_KEY}
      QWEN_API_KEY:         ${QWEN_API_KEY}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY}
    env_file:
      - .env
    depends_on:
      milvus:
        condition: service_healthy
    volumes:
      - ./data:/app/data                # 데이터 마운트
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - maniverse-net
    restart: unless-stopped

# ════════════════════════════════════════════════════════════════════════════
# 볼륨 & 네트워크
# ════════════════════════════════════════════════════════════════════════════

volumes:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  maniverse-net:
    driver: bridge
